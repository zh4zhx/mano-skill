name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install -r requirements.txt pyinstaller
      - run: pyinstaller mano-cua.spec
      - run: tar -czf mano-cua-macos-arm64.tar.gz -C dist/mano-cua .
      - uses: actions/upload-artifact@v4
        with:
          name: mano-cua-macos-arm64
          path: mano-cua-macos-arm64.tar.gz

  build-macos-x86_64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install -r requirements.txt pyinstaller
      - run: arch -x86_64 pyinstaller mano-cua.spec
      - run: tar -czf mano-cua-macos-x86_64.tar.gz -C dist/mano-cua .
      - uses: actions/upload-artifact@v4
        with:
          name: mano-cua-macos-x86_64
          path: mano-cua-macos-x86_64.tar.gz

  build-linux-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install -r requirements.txt pyinstaller
      - run: pyinstaller mano-cua.spec
      - run: tar -czf mano-cua-linux-x86_64.tar.gz -C dist/mano-cua .
      - uses: actions/upload-artifact@v4
        with:
          name: mano-cua-linux-x86_64
          path: mano-cua-linux-x86_64.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install -r requirements.txt pyinstaller
      - run: pyinstaller mano-cua.spec
      - run: Compress-Archive -Path dist/mano-cua/* -DestinationPath mano-cua-windows.zip
        shell: pwsh
      - uses: actions/upload-artifact@v4
        with:
          name: mano-cua-windows
          path: mano-cua-windows.zip

  release:
    needs: [build-macos-arm64, build-macos-x86_64, build-linux-x86_64, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*

  update-homebrew:
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - name: Download source tarball and compute SHA256
        id: sha
        run: |
          VERSION="${GITHUB_REF_NAME}"
          curl -sL "https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${VERSION}.tar.gz" -o source.tar.gz
          echo "source=$(sha256sum source.tar.gz | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update formula
        run: |
          VERSION="${GITHUB_REF_NAME}"
          VERSION_NUM="${VERSION#v}"
          mkdir -p Formula
          cat > Formula/mano-cua.rb << 'FORMULA_EOF'
          class ManoCua < Formula
            desc "VLA Desktop Automation Client"
            homepage "https://github.com/OWNER_PLACEHOLDER/mano-skill"
            url "https://github.com/OWNER_PLACEHOLDER/mano-skill/archive/refs/tags/VERSION_PLACEHOLDER.tar.gz"
            sha256 "SHA256_PLACEHOLDER"
            version "VERSION_NUM_PLACEHOLDER"

            depends_on "python@3.13"
            depends_on "python-tk@3.13"

            def install
              venv = libexec/"venv"
              system "python3.13", "-m", "venv", venv
              system venv/"bin/pip", "install", "-r", "requirements.txt"
              (venv/"src").install Dir["visual"]
              (bin/"mano-cua").write <<~SH
                #!/bin/bash
                SRC="#{venv}/src"
                export PYTHONPATH="$SRC"
                CUSTOM_PY=""
                CFG="$HOME/.mano/config.json"
                if [ -f "$CFG" ]; then
                  CUSTOM_PY=$(python3 -c "import json; print(json.load(open('$CFG')).get('python-path',''))" 2>/dev/null)
                fi
                if [ -n "$CUSTOM_PY" ] && [ -f "$CUSTOM_PY" ]; then
                  exec "$CUSTOM_PY" "$SRC/visual/vla.py" "$@"
                else
                  exec "#{venv}/bin/python3" "$SRC/visual/vla.py" "$@"
                fi
              SH
            end

            test do
              assert_match "usage", shell_output("#{bin}/mano-cua --help")
            end
          end
          FORMULA_EOF
          OWNER="${GITHUB_REPOSITORY_OWNER}"
          sed -i "s|OWNER_PLACEHOLDER|${OWNER}|g" Formula/mano-cua.rb
          sed -i "s|VERSION_PLACEHOLDER|${VERSION}|g" Formula/mano-cua.rb
          sed -i "s|VERSION_NUM_PLACEHOLDER|${VERSION_NUM}|g" Formula/mano-cua.rb
          sed -i "s|SHA256_PLACEHOLDER|${{ steps.sha.outputs.source }}|g" Formula/mano-cua.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/mano-cua.rb
          git diff --cached --quiet && echo "Formula already up to date" && exit 0
          git commit -m "Update mano-cua to ${GITHUB_REF_NAME}"
          git push
